:root{

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;overflow:hidden}

#hologram-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#scanlines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;

#vignette{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;

.corner{position:fixed;width:18px;height:18px;z-index:5;pointer-events:none}
.corner::before,.corner::after{content:'';position:absolute;background:var(--cyan);opacity:.5}
.corner::before{width:100%;height:1px;top:0;left:0}
.corner::after{width:1px;height:100%;top:0;left:0}
.corner.tr::before{right:0;left:auto}.corner.tr::after{right:0;left:auto}
.corner.bl::before{top:auto;bottom:0}.corner.bl::after{top:auto;bottom:0}
.corner.br::before{top:auto;bottom:0;right:0;left:auto}.corner.br::after{top:auto;bottom:0;right:0;left:auto}
.corner.tl{top:8px;left:8px}.corner.tr{top:8px;right:8px}
.corner.bl{bottom:8px;left:8px}.corner.br{bottom:8px;right:8px}
/* ── App shell ── */
#app{position:relative;z-index:10;display:grid;grid-template-columns:268px 1fr 288px;grid-template-rows:50px 1fr;height:100vh}
#topbar{grid-column:1/-1;background:var(--surface);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));

.logo{color:var(--accent);font-size:13px;font-weight:700;letter-spacing:.08em;white-space:nowrap}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
#search{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 11px;
  color:var(--text);font-family:inherit;font-size:12px;outline:none}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted)}
.pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--muted);white-space:nowrap}
.pill span{color:var(--text)}
#vtoggle{display:flex;gap:3px}
.vbtn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:3px 9px;font-size:11px;font-family:inherit;border-radius:4px;cursor:pointer;transition:all .15s}
.vbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* ── Sidebar ── */
#sidebar{background:var(--surface);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  border-right:1px solid var(--border);overflow-y:auto;padding:10px 0}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ts{margin-bottom:3px}
.th{display:flex;align-items:center;gap:7px;padding:5px 14px;cursor:pointer;font-size:11px;font-weight:700;
  letter-spacing:.06em;color:var(--muted);text-transform:uppercase;user-select:none;transition:color .15s}
.th:hover{color:var(--text)}
.th .d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.th .arr{margin-left:auto;transition:transform .2s;font-size:10px}
.th.open .arr{transform:rotate(90deg)}
.tc{display:none}.tc.open{display:block}
.ti{padding:4px 14px 4px 32px;font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;transition:color .15s,background .15s}
.ti:hover,.ti.active{color:var(--text);background:rgba(255,75,75,.06)}
.ti .badge{margin-left:auto;font-size:9px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:1px 5px;color:var(--muted)}
/* ── Main (transparent — hologram shows through) ── */
#main{position:relative;overflow:hidden;background:transparent}
#gc{width:100%;height:100%}
#tv{width:100%;height:100%;display:none;overflow:auto;padding:14px 0}
#detail{background:var(--surface);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  border-left:1px solid var(--border);overflow-y:auto;padding:15px}
#detail::-webkit-scrollbar{width:3px}
#detail::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.de{color:var(--muted);font-size:12px;text-align:center;margin-top:40px;line-height:1.8}
.dt{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.dn{font-size:15px;font-weight:700;color:var(--text);margin-bottom:11px;line-height:1.3}
.dd{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.dr{display:flex;gap:7px;margin-bottom:7px;align-items:flex-start}
.dk{font-size:11px;color:var(--muted);min-width:76px;padding-top:1px}
.dv{font-size:11px;color:var(--text);word-break:break-all;flex:1}
.dtag{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:10px;color:var(--muted);margin:2px}
.dsec{margin-top:14px;border-top:1px solid var(--border);padding-top:11px}
.dst{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.br{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.bl{font-size:10px;color:var(--muted);min-width:76px}
.bt{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.bf{height:100%;border-radius:2px}
.bc{font-size:10px;color:var(--muted);min-width:22px;text-align:right}
.sb{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-bottom:11px}

.s-prototype{background:rgba(107,114,128,.2);color:#9ca3af;border:1px solid rgba(107,114,128,.2)}

.node circle{cursor:pointer;filter:drop-shadow(0 0 4px currentColor)}
.node text{pointer-events:none;font-family:'SF Mono',monospace;fill:rgba(0,229,255,.8)}
.link{stroke:rgba(0,229,255,.28);stroke-width:1}
.link.hl{stroke:#fff;stroke-width:2.5;opacity:1;filter:drop-shadow(0 0 6px #00e5ff)}

.link.link-file-action{stroke:rgba(16,185,129,.75);stroke-width:1.5}
.link.link-action-key{stroke:rgba(251,191,36,.8);stroke-width:1.6}
.link.link-file-key{stroke:rgba(245,158,11,.55);stroke-width:1.2}
.link.link-cross{stroke:rgba(0,229,255,.42);stroke-width:1.1}
.node.dim circle{opacity:.06;filter:none!important}.node.dim text{opacity:.04}
.node.hl circle{stroke:#fff;stroke-width:3;filter:drop-shadow(0 0 12px #fff)!important}

#tip{position:fixed;background:var(--surface);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:8px;

.cb-tool{font-size:13px;font-weight:700;margin-bottom:5px}

.tool-node circle{animation:tool-glow 2.8s ease-in-out infinite}
.node.rng-pick circle{animation:tool-glow .7s ease-in-out infinite!important;stroke:#fff!important;stroke-width:3!important}
</style>

function dailySeed(){var d=new Date();return d.getFullYear()*10000+d.getMonth()*100+d.getDate();}
function seededRand(seed,n){return((seed*9301+49297)%233280/233280*n)|0;}
function randomTool(){
  var toolNodes=N.filter(n=>n.type==='tool'||n.type==='model');
  if(!toolNodes.length)return;
  var seed=dailySeed();
  var pick=toolNodes[seededRand(seed,toolNodes.length)];
  var challenges=TOOL_CHALLENGES[pick.id]||['Spend 15 min exploring this tool deeply.'];
  var challenge=challenges[seededRand(seed+1,challenges.length)];
  nd.classed('rng-pick',n=>n.id===pick.id);
  sel(pick.id);
  var box=document.getElementById('challenge-box');
  box.style.display='block';
  box.querySelector('.cb-tool').textContent='🎲 '+pick.label;
  box.querySelector('.cb-task').textContent=challenge;
  if(window.anime){anime({targets:'#challenge-box',scale:[.92,1],opacity:[0,1],duration:340,easing:'easeOutBack'});}
  setTimeout(()=>nd.classed('rng-pick',false),6000);
}

<script>

(function(){
  var canvas=document.getElementById('hologram-canvas');
  if(!canvas||!window.THREE)return;
  var W=window.innerWidth,H=window.innerHeight;
  var renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true,antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(W,H);
  var scene=new THREE.Scene();
  var camera=new THREE.PerspectiveCamera(60,W/H,.1,200);
  camera.position.set(0,0,32);
  // Fibonacci sphere neurons — brighter, larger
  var NC=320,phi=Math.PI*(3-Math.sqrt(5)),pos=[];
  for(var i=0;i<NC;i++){
    var y=1-(i/(NC-1))*2,r=Math.sqrt(1-y*y),th=phi*i;
    pos.push(new THREE.Vector3(Math.cos(th)*r*14,y*10,Math.sin(th)*r*14));
  }
  var ptGeo=new THREE.BufferGeometry().setFromPoints(pos);
  var ptMat=new THREE.PointsMaterial({color:0xffffff,size:.38,transparent:true,opacity:.92});
  scene.add(new THREE.Points(ptGeo,ptMat));
  // Second layer — large bright core nodes (white glow centers)
  var corePos=pos.filter((_,i)=>i%5===0);
  var coreGeo=new THREE.BufferGeometry().setFromPoints(corePos);
  var coreMat=new THREE.PointsMaterial({color:0x00e5ff,size:.7,transparent:true,opacity:.75});
  scene.add(new THREE.Points(coreGeo,coreMat));
  // Edges
  var lv=[];
  for(var i=0;i<NC;i++){
    var near=[];
    for(var j=0;j<NC;j++){if(i!==j&&pos[i].distanceTo(pos[j])<5.4)near.push(j);}
    near.slice(0,3).forEach(function(j){lv.push(pos[i].x,pos[i].y,pos[i].z,pos[j].x,pos[j].y,pos[j].z);});
  }
  var lGeo=new THREE.BufferGeometry();
  lGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(lv),3));
  scene.add(new THREE.LineSegments(lGeo,new THREE.LineBasicMaterial({color:0x00e5ff,transparent:true,opacity:.18})));
  // Bright triangle mesh overlay — 2nd pass, shorter distance, higher opacity
  var lv2=[];
  for(var i=0;i<NC;i++){
    for(var j=i+1;j<NC;j++){if(pos[i].distanceTo(pos[j])<3.2)lv2.push(pos[i].x,pos[i].y,pos[i].z,pos[j].x,pos[j].y,pos[j].z);}
  }
  var lGeo2=new THREE.BufferGeometry();
  lGeo2.setAttribute('position',new THREE.BufferAttribute(new Float32Array(lv2),3));
  scene.add(new THREE.LineSegments(lGeo2,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.12})));
  // Scan sweep
  var swGeo=new THREE.PlaneGeometry(36,.4);
  var swMat=new THREE.MeshBasicMaterial({color:0x00e5ff,transparent:true,opacity:.22,side:THREE.DoubleSide});
  var sw=new THREE.Mesh(swGeo,swMat);scene.add(sw);
  var sy=-11,sd=1,t=0;
  function tick(){
    requestAnimationFrame(tick);
    t+=.004;scene.rotation.y=t*.11;
    sy+=sd*.1;if(sy>11||sy<-11)sd*=-1;sw.position.y=sy;
    renderer.render(scene,camera);
  }
  tick();
  window.addEventListener('resize',function(){
    var nw=window.innerWidth,nh=window.innerHeight;
    camera.aspect=nw/nh;camera.updateProjectionMatrix();
    renderer.setSize(nw,nh);
  });
})();

</script>

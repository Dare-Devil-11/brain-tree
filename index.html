<style>
:root{
  --bg:#000912;--surface:rgba(8,10,20,.72);--surface2:rgba(14,16,30,.6);
  --text:#f6f4f2;--muted:rgba(246,244,242,.42);--border:rgba(246,244,242,.07);
  --accent:#ff4b4b;--green:#00ffaa;--cyan:#00e5ff;--blur:18px;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;overflow:hidden;width:100vw;height:100vh}

/* ── Primary canvas (the network) ── */
#nc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}

/* ── Scanlines + vignette overlay ── */
#scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}
#vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,9,.7) 100%)}

/* ── Corner brackets ── */
.corner{position:fixed;width:20px;height:20px;z-index:5;pointer-events:none}
.corner::before,.corner::after{content:'';position:absolute;background:var(--cyan);opacity:.4}
.corner::before{width:100%;height:1px;top:0;left:0}
.corner::after{width:1px;height:100%;top:0;left:0}
.corner.tr::before{right:0;left:auto}.corner.tr::after{right:0;left:auto}
.corner.bl::before{top:auto;bottom:0}.corner.bl::after{top:auto;bottom:0}
.corner.br::before{top:auto;bottom:0;right:0;left:auto}.corner.br::after{top:auto;bottom:0;right:0;left:auto}
.corner.tl{top:10px;left:10px}.corner.tr{top:10px;right:10px}
.corner.bl{bottom:10px;left:10px}.corner.br{bottom:10px;right:10px}

/* ── HUD overlay shell ── */
#hud{position:fixed;inset:0;z-index:10;display:grid;grid-template-columns:256px 1fr 272px;grid-template-rows:48px 1fr;pointer-events:none}

/* ── Topbar ── */
#topbar{grid-column:1/-1;background:var(--surface);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;pointer-events:all}
.logo{color:var(--accent);font-size:12px;font-weight:700;letter-spacing:.1em;white-space:nowrap}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
#search{flex:1;background:transparent;border:1px solid var(--border);border-radius:5px;padding:4px 10px;
  color:var(--text);font-family:inherit;font-size:11px;outline:none;transition:border-color .15s}
#search:focus{border-color:rgba(0,229,255,.35)}
#search::placeholder{color:var(--muted)}
.pill{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;
  padding:2px 9px;font-size:10px;color:var(--muted);white-space:nowrap}
.pill span{color:var(--text)}
.tbtn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);
  padding:3px 9px;font-size:10px;font-family:inherit;border-radius:4px;cursor:pointer;transition:all .15s}
.tbtn:hover,.tbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#rng-btn{background:linear-gradient(135deg,#ff4b4b,#7c3aed);border:none;border-radius:5px;
  padding:3px 10px;color:#fff;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:opacity .2s}
#rng-btn:hover{opacity:.8}

/* ── Left sidebar ── */
#sidebar{background:var(--surface);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;pointer-events:all}
#sidebar::-webkit-scrollbar{width:2px}
#sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
.ts{margin-bottom:2px}
.th{display:flex;align-items:center;gap:6px;padding:5px 12px;cursor:pointer;font-size:10px;font-weight:700;
  letter-spacing:.07em;color:var(--muted);text-transform:uppercase;user-select:none;transition:color .15s}
.th:hover{color:var(--text)}
.th .d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.th .arr{margin-left:auto;transition:transform .2s;font-size:9px}
.th.open .arr{transform:rotate(90deg)}
.tc{display:none}.tc.open{display:block}
.ti{padding:3px 12px 3px 28px;font-size:10px;color:var(--muted);cursor:pointer;

.ti:hover,.ti.active{color:var(--text);background:rgba(255,75,75,.07)}

/* ── Depth controls ── */
#depth-ctrl{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:5px;z-index:11}

</style>
</head>

// ── Flatten tree ──────────────────────────────────────────────
let N=[],L=[],M={};
function flat(n,p,d){
  d=d||0;
  var o={id:n.id,label:n.label,type:n.type,color:n.color||(p?p.color:'#888'),
    status:n.status,path:n.path,description:n.description,meta:n.meta,
    data:n.data,stack:n.stack,graph_nodes:n.graph_nodes,version:n.version,
    files:n.files,skills:n.skills,depth:d,parent:p?p.id:null};
  N.push(o);M[o.id]=o;
  if(p)L.push({source:p.id,target:n.id});
  if(n.children)n.children.forEach(c=>flat(c,n,d+1));
}

// ── 3D layout ─────────────────────────────────────────────────
// Fibonacci sphere placement per depth ring
function fibSphere(n,r){
  var pts=[];var phi=Math.PI*(3-Math.sqrt(5));
  for(var i=0;i<n;i++){
    var y=1-(i/(Math.max(n-1,1)))*2;
    var rad=Math.sqrt(1-y*y);
    var th=phi*i;
    pts.push({x:Math.cos(th)*rad*r,y:y*r,z:Math.sin(th)*rad*r});
  }
  return pts;
}

// Assign 3D positions

var depth3=N.filter(n=>n.depth===3);

  var pts=fibSphere(Math.max(sibs.length,1),9);

});

depth3.forEach(n=>{
  var par=M[n.parent];if(!par){n.x3=0;n.y3=0;n.z3=0;return}
  var sibs=depth3.filter(x=>x.parent===n.parent);
  var si=sibs.indexOf(n);
  var pts=fibSphere(Math.max(sibs.length,1),4.5);
  var pt=pts[si]||{x:0,y:0,z:0};
  n.x3=(par.x3||0)+pt.x;n.y3=(par.y3||0)+pt.y;n.z3=(par.z3||0)+pt.z;
});

// deeper than 3 → cluster near parent
N.filter(n=>n.depth>3).forEach(n=>{
  var par=M[n.parent];
  if(par){n.x3=(par.x3||0)+(Math.random()-.5)*2;n.y3=(par.y3||0)+(Math.random()-.5)*2;n.z3=(par.z3||0)+(Math.random()-.5)*2;}
  else{n.x3=0;n.y3=0;n.z3=0;}
});

// ── Three.js scene ────────────────────────────────────────────
var canvas=document.getElementById('nc');
var renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);

var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,.1,500);
camera.position.set(0,0,55);

// Controls (manual orbit)
var isDragging=false,prevMouse={x:0,y:0};
var camTheta=0,camPhi=Math.PI/2,camR=55;
var targetTheta=0,targetPhi=Math.PI/2,targetR=55;

function updateCamera(){
  camera.position.x=camR*Math.sin(camPhi)*Math.sin(camTheta);
  camera.position.y=camR*Math.cos(camPhi);
  camera.position.z=camR*Math.sin(camPhi)*Math.cos(camTheta);
  camera.lookAt(0,0,0);
}
updateCamera();

canvas.addEventListener('mousedown',e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY}});
window.addEventListener('mouseup',()=>isDragging=false);
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  var dx=e.clientX-prevMouse.x,dy=e.clientY-prevMouse.y;
  targetTheta-=dx*.005;targetPhi=Math.max(.1,Math.min(Math.PI-.1,targetPhi+dy*.005));
  prevMouse={x:e.clientX,y:e.clientY};
});
canvas.addEventListener('wheel',e=>{targetR=Math.max(12,Math.min(120,targetR+e.deltaY*.05));e.preventDefault()},{passive:false});

// ── Build node meshes ─────────────────────────────────────────
var MAX_DEPTH_SHOW=3;
var nodeMeshes=[];var nodeMap={};

function nodeRadius(d){return d.depth===0?1.4:d.depth===1?.8:d.depth===2?.5:.3}
function parseColor(c){try{return new THREE.Color(c)}catch(e){return new THREE.Color('#888888')}}

N.forEach(n=>{
  var geo=new THREE.SphereGeometry(nodeRadius(n),12,12);
  var col=parseColor(n.color||'#888');
  var mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.9});
  var mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(n.x3||0,n.y3||0,n.z3||0);
  mesh.userData={id:n.id,depth:n.depth};
  mesh.visible=n.depth<=MAX_DEPTH_SHOW;
  scene.add(mesh);
  nodeMeshes.push(mesh);
  nodeMap[n.id]=mesh;

  // Glow ring for depth 0
  if(n.depth===0){
    var rg=new THREE.RingGeometry(1.7,2.0,40);
    var rm=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.25,side:THREE.DoubleSide});
    var ring=new THREE.Mesh(rg,rm);
    scene.add(ring);
  }
});

// ── Build edges ───────────────────────────────────────────────
var edgeLines=[];
var edgeMaterial=new THREE.LineBasicMaterial({color:0x00e5ff,transparent:true,opacity:.12});

L.forEach(l=>{
  var s=M[l.source],t=M[l.target];if(!s||!t)return;
  var pts=[new THREE.Vector3(s.x3||0,s.y3||0,s.z3||0),new THREE.Vector3(t.x3||0,t.y3||0,t.z3||0)];
  var geo=new THREE.BufferGeometry().setFromPoints(pts);
  var line=new THREE.Line(geo,edgeMaterial.clone());
  line.userData={source:l.source,target:l.target,depth:Math.max(s.depth,t.depth)};
  line.visible=(Math.max(s.depth,t.depth))<=MAX_DEPTH_SHOW;
  scene.add(line);
  edgeLines.push(line);
});

// ── Ambient scan plane ────────────────────────────────────────
var sweepGeo=new THREE.PlaneGeometry(60,.3);
var sweepMat=new THREE.MeshBasicMaterial({color:0x00e5ff,transparent:true,opacity:.09,side:THREE.DoubleSide});
var sweep=new THREE.Mesh(sweepGeo,sweepMat);
scene.add(sweep);
var sweepY=-25,sweepDir=1;

// ── Raycasting ───────────────────────────────────────────────
var raycaster=new THREE.Raycaster();raycaster.params.Points={threshold:.3};
var mouse=new THREE.Vector2(-99,-99);
var hoveredId=null;

canvas.addEventListener('mousemove',e=>{
  // Only raycast if not dragging
  if(isDragging)return;
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  var visibles=nodeMeshes.filter(m=>m.visible);
  var hits=raycaster.intersectObjects(visibles);
  var tip=document.getElementById('tip');
  if(hits.length){
    var id=hits[0].object.userData.id;
    if(id!==hoveredId){hoveredId=id;}
    var nd=M[id];
    document.getElementById('tt').textContent=nd.label;
    document.getElementById('ty').textContent=nd.type+(nd.depth>0?' · depth '+nd.depth:'');
    tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';
    tip.style.opacity='1';
    canvas.style.cursor='pointer';
  } else {
    hoveredId=null;tip.style.opacity='0';canvas.style.cursor='default';
  }
});

canvas.addEventListener('click',e=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  var visibles=nodeMeshes.filter(m=>m.visible);
  var hits=raycaster.intersectObjects(visibles);
  if(hits.length)sel(hits[0].object.userData.id);
});

// ── Depth toggle ──────────────────────────────────────────────
function adjustDepth(delta){
  MAX_DEPTH_SHOW=Math.max(0,Math.min(5,MAX_DEPTH_SHOW+delta));
  nodeMeshes.forEach(m=>m.visible=m.userData.depth<=MAX_DEPTH_SHOW);
  edgeLines.forEach(l=>l.visible=l.userData.depth<=MAX_DEPTH_SHOW);
}

function resetCam(){targetTheta=0;targetPhi=Math.PI/2;targetR=55;}

// ── Sidebar ───────────────────────────────────────────────────
function buildNav(){
  var nav=document.getElementById('nav');
  var r=document.createElement('div');r.className='ti';r.style.paddingLeft='12px';
  var rd=document.createElement('span');rd.textContent='◈ ';rd.style.color=D.color;
  r.appendChild(rd);r.appendChild(document.createTextNode(D.label));
  r.onclick=()=>sel('root');nav.appendChild(r);
  (D.children||[]).forEach(cl=>{
    var sec=document.createElement('div');sec.className='ts';
    var hdr=document.createElement('div');hdr.className='th open';
    var dd=document.createElement('div');dd.className='d';dd.style.background=cl.color;
    hdr.appendChild(dd);hdr.appendChild(document.createTextNode(cl.label));
    var arr=document.createElement('span');arr.className='arr';arr.textContent='▶';hdr.appendChild(arr);
    var ch=document.createElement('div');ch.className='tc open';
    hdr.onclick=()=>{hdr.classList.toggle('open');ch.classList.toggle('open')};
    (cl.children||[]).forEach(it=>{
      var el=document.createElement('div');el.className='ti';el.dataset.id=it.id;
      var dot=document.createElement('span');dot.textContent='●';
      dot.style.cssText='color:'+(it.color||cl.color)+';font-size:7px';
      el.appendChild(dot);el.appendChild(document.createTextNode(' '+it.label));
      if(it.graph_nodes){var b=document.createElement('span');b.className='badge';b.textContent=it.graph_nodes;el.appendChild(b);}
      el.onclick=()=>sel(it.id);ch.appendChild(el);
    });
    sec.appendChild(hdr);sec.appendChild(ch);nav.appendChild(sec);
  });
}
buildNav();

// ── Detail panel ──────────────────────────────────────────────
function mk(t,c,x){var e=document.createElement(t);if(c)e.className=c;if(x!==undefined)e.textContent=x;return e}
function mkr(k,v){var r=mk('div','dr');r.appendChild(mk('div','dk',k));r.appendChild(mk('div','dv',v));return r}

function renderDetail(d){
  var p=document.getElementById('detail');while(p.firstChild)p.removeChild(p.firstChild);
  p.appendChild(mk('div','dt',d.type));p.appendChild(mk('div','dn',d.label));
  if(d.status){p.appendChild(mk('div','sb s-'+d.status.replace(/\s+/g,'-'),d.status));}
  if(d.description)p.appendChild(mk('div','dd',d.description));
  if(d.path)p.appendChild(mkr('path',d.path));
  if(d.version)p.appendChild(mkr('version',d.version));
  if(d.graph_nodes)p.appendChild(mkr('nodes',d.graph_nodes.toLocaleString()));
  ['stack','skills','files'].forEach(key=>{
    if(d[key]&&d[key].length){
      var row=mk('div','dr');row.appendChild(mk('div','dk',key));
      var v=mk('div','dv');d[key].forEach(s=>v.appendChild(mk('span','dtag',s)));
      row.appendChild(v);p.appendChild(row);
    }
  });
  if(d.meta){
    var s=mk('div','dsec');s.appendChild(mk('div','dst','Meta'));
    Object.keys(d.meta).forEach(k=>s.appendChild(mkr(k,String(d.meta[k]))));
    p.appendChild(s);
  }
  if(d.data){
    var vals=Object.values(d.data),mx=Math.max(...vals);
    var s=mk('div','dsec');s.appendChild(mk('div','dst','Activity'));
    Object.keys(d.data).sort((a,b)=>d.data[b]-d.data[a]).forEach(k=>{
      var v=d.data[k],pct=(v/mx*100).toFixed(0);
      var row=mk('div','br2');row.appendChild(mk('div','bl',k));
      var bt=mk('div','bt');var bf=mk('div','bf');
      bf.style.width=pct+'%';bf.style.background=d.color||'#ff4b4b';
      bt.appendChild(bf);row.appendChild(bt);row.appendChild(mk('div','bc',String(v)));
      s.appendChild(row);
    });
    p.appendChild(s);
  }
  if(window.anime){anime({targets:'#detail > *',opacity:[0,1],translateY:[5,0],duration:240,delay:anime.stagger(25),easing:'easeOutQuart'});}
}

// ── Selection + highlight ─────────────────────────────────────
var selectedId=null;
var originalColors={};
N.forEach(n=>{originalColors[n.id]=parseColor(n.color||'#888')});

function sel(id){
  selectedId=id;
  var d=M[id];if(!d)return;

  // Reset all
  nodeMeshes.forEach(m=>{
    var nd=M[m.userData.id];
    m.material.opacity=m.userData.depth<=MAX_DEPTH_SHOW?.9:0;
    m.material.color.copy(originalColors[m.userData.id]||new THREE.Color('#888'));
  });
  edgeLines.forEach(l=>{l.material.opacity=.12;l.material.color.set(0x00e5ff)});

  // Connected nodes
  var connected={};connected[id]=true;
  L.forEach(l=>{if(l.source===id)connected[l.target]=true;if(l.target===id)connected[l.source]=true});

  // Dim non-connected
  nodeMeshes.forEach(m=>{
    if(!connected[m.userData.id]&&m.userData.id!==id){
      m.material.opacity=.08;
    }
  });
  // Highlight edges
  edgeLines.forEach(l=>{
    if(l.userData.source===id||l.userData.target===id){
      l.material.opacity=.55;l.material.color.set(0xff4b4b);
    }
  });
  // Pulse selected
  var sm=nodeMap[id];
  if(sm&&window.anime){
    anime({targets:{v:.9},v:1.5,duration:300,easing:'easeOutQuart',update:o=>sm.material.opacity=o.animatables[0].target.v});
  }

  // Sidebar active
  document.querySelectorAll('.ti').forEach(e=>e.classList.remove('active'));
  var el=document.querySelector('.ti[data-id="'+id+'"]');
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'})}

  // Focus camera toward node
  if(d.depth>0){
    var nx=d.x3||0,ny=d.y3||0,nz=d.z3||0;
    var dist=Math.sqrt(nx*nx+ny*ny+nz*nz);
    if(dist>.1){
      targetTheta=Math.atan2(nx,nz);
      targetPhi=Math.acos(Math.max(-1,Math.min(1,ny/dist)));
      targetR=Math.max(22,dist*2.2);
    }
  }

  renderDetail(d);
}

// ── Search ────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',e=>{
  var q=e.target.value.toLowerCase().trim();
  if(!q){
    nodeMeshes.forEach(m=>m.material.opacity=m.userData.depth<=MAX_DEPTH_SHOW?.9:0);
    edgeLines.forEach(l=>l.material.opacity=.12);
    return;
  }
  var matched={};
  N.forEach(n=>{if(n.label.toLowerCase().includes(q)||(n.description||'').toLowerCase().includes(q))matched[n.id]=true});
  nodeMeshes.forEach(m=>m.material.opacity=matched[m.userData.id]?.9:.05);
  edgeLines.forEach(l=>l.material.opacity=.03);
});

// ── Random tool challenge ─────────────────────────────────────
var TC={'tool-claude':['Run /graphify on ~/AI-OS/repos/','Add a new skill: write SKILL.md + test','Use /ultraplan to map your top 3 projects'],'tool-playwright':['Wire playwright-mcp to MCP config','Scrape one competitor site → ~/AI-OS/outputs/'],'tool-graphify':['Run: bash ~/AI-OS/scripts/grow.sh --open','Graphify a new repo you want to understand'],'tool-ollama':['Summarize 5 logs via llama3.2 using ai.sh','Run: ollama run qwen2.5-coder:3b — fix a script'],'tool-ghl':['Review content-bot.log — post best entry to GHL','Audit 3 UMAS funnels for single-CTA violations'],'tool-n8n':['Create one automation triggered by webhook','Connect n8n to GHL: auto-tag UMAS lead visitors'],'tool-gemini':['Run: gemini -p "analyze ~/AI-OS" — compare to Claude','Use Gemini 1M context to read an entire repo'],'tool-obsidian':['Add 3 notes linked to Brain-Tree nodes','Review Brain-Tree INDEX.md — update one stale node']};
function dailySeed(){var d=new Date();return d.getFullYear()*10000+d.getMonth()*100+d.getDate();}
function seededRand(seed,n){return((seed*9301+49297)%233280/233280*n)|0;}
function randomTool(){
  var toolNodes=N.filter(n=>n.type==='tool');if(!toolNodes.length)return;
  var seed=dailySeed();
  var pick=toolNodes[seededRand(seed,toolNodes.length)];
  var challenges=TC[pick.id]||['Spend 15 min exploring this tool deeply.'];
  var ch=challenges[seededRand(seed+1,challenges.length)];
  var box=document.getElementById('challenge-box');
  box.style.display='block';
  box.querySelector('.cb-tool').textContent='⚄ '+pick.label;
  box.querySelector('.cb-task').textContent=ch;
  sel(pick.id);
  if(window.anime)anime({targets:'#challenge-box',scale:[.9,1],opacity:[0,1],duration:300,easing:'easeOutBack'});
}

// ── Render loop ───────────────────────────────────────────────
var t=0;
function animate(){
  requestAnimationFrame(animate);
  t+=.004;

  // Smooth camera
  camTheta+=(targetTheta-camTheta)*.06;
  camPhi+=(targetPhi-camPhi)*.06;
  camR+=(targetR-camR)*.06;
  updateCamera();

  // Sweep plane
  sweepY+=sweepDir*.07;
  if(sweepY>26||sweepY<-26)sweepDir*=-1;
  sweep.position.y=sweepY;

  // Slow global rotation when nothing selected
  if(!selectedId)scene.rotation.y=t*.04;
  else scene.rotation.y+=(0-scene.rotation.y)*.02;

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// Init
setTimeout(()=>sel('root'),600);
</script>
</body>

// flatten
var N=[],L=[],M={};
function flat(n,p,d){
  d=d||0;
  var o=Object.assign({},n,{depth:d,parent:p?p.id:null,x3:0,y3:0,z3:0});
  delete o.children;
  N.push(o);M[o.id]=o;
  if(p)L.push({source:p.id,target:n.id});
  if(n.children)n.children.forEach(function(c){flat(c,n,d+1)});
}

// fibonacci sphere
function fibSphere(count,r){
  var pts=[],phi=Math.PI*(3-Math.sqrt(5));
  for(var i=0;i<count;i++){
    var y=1-(i/Math.max(count-1,1))*2,rad=Math.sqrt(1-y*y),th=phi*i;
    pts.push({x:Math.cos(th)*rad*r,y:y*r,z:Math.sin(th)*rad*r});
  }
  return pts;
}

});

});

// three.js
var canvas=document.getElementById('nc');
var W=window.innerWidth,H=window.innerHeight;
var renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W,H);
renderer.sortObjects=true;
var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(52,W/H,.1,600);

function mkGlowTex(hex,inner){
  var c=document.createElement('canvas');c.width=128;c.height=128;
  var ctx=c.getContext('2d');
  var col=new THREE.Color(hex);
  var r=(col.r*255)|0,g=(col.g*255)|0,b=(col.b*255)|0;
  var grad=ctx.createRadialGradient(64,64,0,64,64,64);
  grad.addColorStop(0,'rgba('+r+','+g+','+b+','+inner+')');
  grad.addColorStop(.35,'rgba('+r+','+g+','+b+','+(inner*.2)+')');
  grad.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
  ctx.fillStyle=grad;ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
var whiteTex=(function(){
  var c=document.createElement('canvas');c.width=64;c.height=64;
  var ctx=c.getContext('2d');
  var g=ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(.4,'rgba(255,255,255,.12)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
})();

function parseCol(c){try{return new THREE.Color(c)}catch(e){return new THREE.Color('#4488cc')}}
function nodeR(d){return d===0?1.8:d===1?1.1:d===2?.65:.38}

// particles — data rain
var RC=700,rPos=new Float32Array(RC*3),rVel=new Float32Array(RC);
for(var i=0;i<RC;i++){rPos[i*3]=(Math.random()-.5)*180;rPos[i*3+1]=(Math.random()-.5)*80;rPos[i*3+2]=(Math.random()-.5)*80-30;rVel[i]=.05+Math.random()*.1}
var rGeo=new THREE.BufferGeometry();rGeo.setAttribute('position',new THREE.BufferAttribute(rPos,3));
scene.add(new THREE.Points(rGeo,new THREE.PointsMaterial({color:0x003066,size:.16,transparent:true,opacity:.5,depthWrite:false})));

// stars
var SC=1200,sPos=new Float32Array(SC*3);
for(var i=0;i<SC;i++){sPos[i*3]=(Math.random()-.5)*400;sPos[i*3+1]=(Math.random()-.5)*400;sPos[i*3+2]=(Math.random()-.5)*400}
var sGeo=new THREE.BufferGeometry();sGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
scene.add(new THREE.Points(sGeo,new THREE.PointsMaterial({color:0x99bbdd,size:.09,transparent:true,opacity:.3,depthWrite:false})));

// grid + floor glow
var grid=new THREE.GridHelper(120,40,0x001e44,0x000e22);
grid.position.y=-22;grid.material.transparent=true;grid.material.opacity=.3;
scene.add(grid);
var fGeo=new THREE.PlaneGeometry(80,80);
var fMat=new THREE.MeshBasicMaterial({map:mkGlowTex('#0040ff',.4),transparent:true,opacity:.16,blending:THREE.AdditiveBlending,side:THREE.DoubleSide,depthWrite:false});
var fMesh=new THREE.Mesh(fGeo,fMat);fMesh.rotation.x=-Math.PI/2;fMesh.position.y=-22;scene.add(fMesh);

// sweep plane
var swGeo=new THREE.PlaneGeometry(70,.2);
var swMat=new THREE.MeshBasicMaterial({color:0x00e5ff,transparent:true,opacity:.06,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false});
var sweep=new THREE.Mesh(swGeo,swMat);sweep.rotation.y=Math.PI/2;scene.add(sweep);
var swY=-25,swD=1;

// build nodes
var MAX_DEPTH=2;
var meshMap={},ringMap={},origCols={};

N.forEach(function(n){
  var col=parseCol(n.color||'#4488cc');
  origCols[n.id]=col.clone();
  var r=nodeR(n.depth);
  var grp=new THREE.Group();
  grp.position.set(n.x3,n.y3,n.z3);
  grp.userData.id=n.id;grp.userData.depth=n.depth;

  // sphere
  var mesh=new THREE.Mesh(new THREE.SphereGeometry(r,20,20),new THREE.MeshBasicMaterial({color:col.clone(),transparent:true,opacity:.92}));
  grp.add(mesh);meshMap[n.id]=mesh;

  // glow sprite
  var sp=new THREE.Sprite(new THREE.SpriteMaterial({map:whiteTex,color:col.clone(),transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:.65}));
  sp.scale.set(r*5.5,r*5.5,1);grp.add(sp);

  // rings
  if(n.depth<=1){
    var rg=new THREE.Group();
    [{ri:r*2.0,ro:r*2.18,tilt:.3,spd:.55,op:.5},{ri:r*2.8,ro:r*2.95,tilt:-.38,spd:-.38,op:.27},{ri:r*3.6,ro:r*3.72,tilt:.16,spd:.22,op:.15}].forEach(function(rd){
      var ring=new THREE.Mesh(new THREE.RingGeometry(rd.ri,rd.ro,64),new THREE.MeshBasicMaterial({color:col.clone(),transparent:true,opacity:rd.op,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
      ring.rotation.x=Math.PI/2+rd.tilt;ring.rotation.z=Math.random()*Math.PI;ring.userData.spd=rd.spd;rg.add(ring);
    });
    grp.add(rg);ringMap[n.id]=rg;
  } else if(n.depth===2){
    var ring=new THREE.Mesh(new THREE.RingGeometry(r*1.7,r*1.85,32),new THREE.MeshBasicMaterial({color:col.clone(),transparent:true,opacity:.28,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
    ring.rotation.x=Math.PI/2+.3;ring.userData.spd=.38;
    var rg=new THREE.Group();rg.add(ring);grp.add(rg);ringMap[n.id]=rg;
  }

  // floor projection
  if(n.depth<=1){
    var fp=new THREE.Mesh(new THREE.CircleGeometry(r*(n.depth===0?5:3.2),32),new THREE.MeshBasicMaterial({map:mkGlowTex(n.color||'#4488cc',.55),transparent:true,opacity:n.depth===0?.42:.26,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide}));
    fp.rotation.x=-Math.PI/2;fp.position.set(n.x3,n.y3-22,n.z3);scene.add(fp);
  }

  grp.visible=n.depth<=MAX_DEPTH;
  scene.add(grp);
});

// edges
var edgeLines=[];
L.forEach(function(l){
  var s=M[l.source],t=M[l.target];if(!s||!t)return;
  var mx=Math.max(s.depth,t.depth);
  var geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(s.x3,s.y3,s.z3),new THREE.Vector3(t.x3,t.y3,t.z3)]);
  var line=new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x00aaff,transparent:true,opacity:mx===1?.2:mx===2?.11:.05,blending:THREE.AdditiveBlending,depthWrite:false}));
  line.userData.src=l.source;line.userData.tgt=l.target;line.userData.depth=mx;
  line.visible=mx<=MAX_DEPTH;scene.add(line);edgeLines.push(line);
});

// camera
var cT=0,cP=1.2,cR=58,tT=0,tP=1.2,tR=58;
var drag=false,pm={x:0,y:0},autoRot=true;
function updateCam(){
  camera.position.set(cR*Math.sin(cP)*Math.sin(cT),cR*Math.cos(cP),cR*Math.sin(cP)*Math.cos(cT));
  camera.lookAt(0,0,0);
}
updateCam();
canvas.addEventListener('mousedown',function(e){if(e.target===canvas){drag=true;pm.x=e.clientX;pm.y=e.clientY;autoRot=false;document.getElementById('bauto').classList.remove('on')}});
window.addEventListener('mouseup',function(){drag=false});
window.addEventListener('mousemove',function(e){if(drag){var dx=e.clientX-pm.x,dy=e.clientY-pm.y;tT-=dx*.005;tP=Math.max(.1,Math.min(Math.PI-.1,tP+dy*.005));pm.x=e.clientX;pm.y=e.clientY}});
canvas.addEventListener('wheel',function(e){tR=Math.max(14,Math.min(140,tR+e.deltaY*.04));e.preventDefault()},{passive:false});
function toggleAuto(){autoRot=!autoRot;document.getElementById('bauto').classList.toggle('on',autoRot)}
function resetCam(){tT=0;tP=1.2;tR=58;autoRot=true;document.getElementById('bauto').classList.add('on')}

// raycasting
var ray=new THREE.Raycaster();var mu=new THREE.Vector2(-9,-9);
function getSphereMeshes(){
  var out=[];
  scene.traverse(function(o){
    if(o.isMesh&&o.geometry&&o.geometry.type==='SphereGeometry'&&o.parent&&o.parent.userData&&o.parent.userData.id&&o.parent.visible)out.push(o);
  });
  return out;
}
canvas.addEventListener('mousemove',function(e){
  if(drag||e.target!==canvas)return;
  mu.x=(e.clientX/W)*2-1;mu.y=-(e.clientY/H)*2+1;
  ray.setFromCamera(mu,camera);
  var hits=ray.intersectObjects(getSphereMeshes());
  var tip=document.getElementById('tip');
  if(hits.length){
    var id=hits[0].object.parent.userData.id;var nd=M[id];
    document.getElementById('tt').textContent=nd.label;
    document.getElementById('ty').textContent=nd.type+(nd.depth?' · depth '+nd.depth:'');
    tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';tip.style.opacity='1';canvas.style.cursor='pointer';
  } else{tip.style.opacity='0';canvas.style.cursor='default'}
});
canvas.addEventListener('click',function(e){
  if(e.target!==canvas)return;
  mu.x=(e.clientX/W)*2-1;mu.y=-(e.clientY/H)*2+1;
  ray.setFromCamera(mu,camera);
  var hits=ray.intersectObjects(getSphereMeshes());
  if(hits.length)sel(hits[0].object.parent.userData.id);
});

// selection
var selId=null;
function sel(id){
  selId=id;var d=M[id];if(!d)return;
  // reset
  scene.traverse(function(o){
    if(o.isMesh&&o.geometry&&o.geometry.type==='SphereGeometry'&&o.parent&&o.parent.userData&&o.parent.userData.id){
      var nd=M[o.parent.userData.id];if(!nd)return;
      o.material.color.copy(origCols[nd.id]||new THREE.Color('#888'));o.material.opacity=.92;
    }
  });
  edgeLines.forEach(function(l){l.material.color.set(0x00aaff);l.material.opacity=l.userData.depth===1?.2:l.userData.depth===2?.11:.05});
  // connected
  var con={};con[id]=true;
  L.forEach(function(l){if(l.source===id)con[l.target]=true;if(l.target===id)con[l.source]=true});
  scene.traverse(function(o){
    if(o.isMesh&&o.geometry&&o.geometry.type==='SphereGeometry'&&o.parent&&o.parent.userData&&o.parent.userData.id){
      if(!con[o.parent.userData.id])o.material.opacity=.06;
    }
  });
  edgeLines.forEach(function(l){
    if(l.userData.src===id||l.userData.tgt===id){l.material.color.set(0xff4b4b);l.material.opacity=.6}
  });
  // focus cam
  if(d.depth>0){
    var len=Math.sqrt(d.x3*d.x3+d.y3*d.y3+d.z3*d.z3);
    if(len>.1){tT=Math.atan2(d.x3,d.z3);tP=Math.acos(Math.max(-1,Math.min(1,d.y3/len)));tR=Math.max(24,len*2.4)}
    autoRot=false;
  }
  // sidebar
  document.querySelectorAll('.ti').forEach(function(e){e.classList.remove('active')});
  var el=document.querySelector('.ti[data-id="'+id+'"]');
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'})}
  renderDetail(d);
}

// depth control
function adjDepth(delta){
  MAX_DEPTH=Math.max(0,Math.min(5,MAX_DEPTH+delta));
  scene.traverse(function(o){if(o.isGroup&&o.userData&&o.userData.id)o.visible=M[o.userData.id].depth<=MAX_DEPTH});
  edgeLines.forEach(function(l){l.visible=l.userData.depth<=MAX_DEPTH});
}

// sidebar — safe DOM only
function buildNav(){
  var nav=document.getElementById('nav');
  // root item
  var root=document.createElement('div');root.className='ti';root.style.paddingLeft='10px';
  var rdot=document.createElement('span');rdot.className='ti-dot';rdot.textContent='◈';rdot.style.color='#ff4b4b';rdot.style.fontSize='10px';
  var rlbl=document.createElement('span');rlbl.className='ti-lbl';rlbl.textContent=D.label;
  root.appendChild(rdot);root.appendChild(rlbl);
  root.addEventListener('click',function(){sel('root')});
  nav.appendChild(root);

  (D.children||[]).forEach(function(cl){
    var sec=document.createElement('div');sec.className='ts';
    // header
    var hdr=document.createElement('div');hdr.className='th open';
    var hdot=document.createElement('div');hdot.className='th-dot';hdot.style.background=cl.color;hdot.style.boxShadow='0 0 5px '+cl.color;
    var hlbl=document.createElement('span');hlbl.textContent=cl.label;hlbl.style.flex='1';
    var harr=document.createElement('span');harr.className='th-arr';harr.textContent='▶';
    hdr.appendChild(hdot);hdr.appendChild(hlbl);hdr.appendChild(harr);
    // children
    var ch=document.createElement('div');ch.className='tc open';
    hdr.addEventListener('click',function(){hdr.classList.toggle('open');ch.classList.toggle('open')});
    (cl.children||[]).forEach(function(it){
      var el=document.createElement('div');el.className='ti';el.dataset.id=it.id;
      var dot=document.createElement('span');dot.className='ti-dot';dot.textContent='●';
      dot.style.color=it.color||cl.color;dot.style.textShadow='0 0 4px '+(it.color||cl.color);
      var lbl=document.createElement('span');lbl.className='ti-lbl';lbl.textContent=it.label;
      el.appendChild(dot);el.appendChild(lbl);
      if(it.graph_nodes){var b=document.createElement('span');b.className='badge';b.textContent=it.graph_nodes;el.appendChild(b)}
      el.addEventListener('click',function(){sel(it.id)});
      ch.appendChild(el);
    });
    sec.appendChild(hdr);sec.appendChild(ch);nav.appendChild(sec);
  });
}
buildNav();

// detail panel
function mk(t,c,x){var e=document.createElement(t);if(c)e.className=c;if(x!==undefined)e.textContent=x;return e}
function mkr(k,v){var r=mk('div','dr');r.appendChild(mk('div','dk',k));r.appendChild(mk('div','dv',v));return r}
function renderDetail(d){
  var p=document.getElementById('detail');while(p.firstChild)p.removeChild(p.firstChild);
  p.appendChild(mk('div','dt',d.type));
  var dn=mk('div','dn',d.label);dn.style.color=d.color||'var(--text)';dn.style.textShadow='0 0 18px '+(d.color||'transparent');p.appendChild(dn);
  if(d.status)p.appendChild(mk('div','sb s-'+d.status.replace(/\s+/g,'-'),d.status));
  if(d.description)p.appendChild(mk('div','dd',d.description));
  if(d.path)p.appendChild(mkr('path',d.path));
  if(d.version)p.appendChild(mkr('version',d.version));
  if(d.graph_nodes)p.appendChild(mkr('nodes',d.graph_nodes.toLocaleString()));
  ['stack','skills','files'].forEach(function(key){
    if(d[key]&&d[key].length){
      var row=mk('div','dr');row.appendChild(mk('div','dk',key));
      var v=mk('div','dv');d[key].forEach(function(s){v.appendChild(mk('span','dtag',s))});
      row.appendChild(v);p.appendChild(row);
    }
  });
  if(d.meta){var s=mk('div','dsec');s.appendChild(mk('div','dst','Meta'));Object.keys(d.meta).forEach(function(k){s.appendChild(mkr(k,String(d.meta[k])))});p.appendChild(s)}
  if(d.data){
    var vals=Object.values(d.data),mx=Math.max.apply(null,vals);
    var s=mk('div','dsec');s.appendChild(mk('div','dst','Activity'));
    Object.keys(d.data).sort(function(a,b){return d.data[b]-d.data[a]}).forEach(function(k){
      var v=d.data[k],pct=(v/mx*100).toFixed(0);
      var row=mk('div','br2');row.appendChild(mk('div','bl',k));
      var bt=mk('div','bt');var bf=mk('div','bf');
      bf.style.width=pct+'%';bf.style.background=d.color||'#00e5ff';bf.style.boxShadow='0 0 6px '+(d.color||'#00e5ff');
      bt.appendChild(bf);row.appendChild(bt);row.appendChild(mk('div','bc',String(v)));s.appendChild(row);
    });
    p.appendChild(s);
  }
  if(window.anime)anime({targets:'#detail > *',opacity:[0,1],translateY:[4,0],duration:200,delay:anime.stagger(18),easing:'easeOutQuart'});
}

// search
document.getElementById('search').addEventListener('input',function(e){
  var q=e.target.value.toLowerCase().trim();
  scene.traverse(function(o){
    if(o.isMesh&&o.geometry&&o.geometry.type==='SphereGeometry'&&o.parent&&o.parent.userData&&o.parent.userData.id){
      var nd=M[o.parent.userData.id];
      o.material.opacity=!q?.92:(nd.label.toLowerCase().includes(q)||(nd.description||'').toLowerCase().includes(q))?.92:.04;
    }
  });
  edgeLines.forEach(function(l){l.material.opacity=!q?(l.userData.depth===1?.2:l.userData.depth===2?.11:.05):.02});
});

// challenge
var TC={'tool-claude':['Run /graphify on ~/AI-OS/repos/','Write SKILL.md + test with one real prompt','Use /ultraplan to map top 3 projects into OKRs'],'tool-playwright':['Wire playwright-mcp to ~/.claude/settings.json MCP config','Scrape one competitor → ~/AI-OS/outputs/'],'tool-graphify':['bash ~/AI-OS/scripts/grow.sh --open','Graphify a new repo you want to understand'],'tool-ollama':['Summarize 5 AI-OS logs via llama3.2','ollama run qwen2.5-coder:3b — fix a script'],'tool-ghl':['Review content-bot.log — post best entry to GHL','Audit 3 UMAS funnels for single-CTA violations'],'tool-n8n':['Create one automation triggered by webhook','Connect n8n to GHL: auto-tag UMAS lead visitors'],'tool-gemini':['gemini -p "analyze ~/AI-OS" — compare to Claude','Use 1M context to read an entire repo'],'tool-obsidian':['Add 3 notes linked to Brain-Tree nodes','Review INDEX.md — update one stale node']};
function seed(){var d=new Date();return d.getFullYear()*10000+d.getMonth()*100+d.getDate()}
function srand(s,n){return((s*9301+49297)%233280/233280*n)|0}
function randomTool(){
  var tools=N.filter(function(n){return n.type==='tool'});if(!tools.length)return;
  var s=seed(),pick=tools[srand(s,tools.length)];
  var ch=(TC[pick.id]||['Spend 15 min exploring this tool.'])[srand(s+1,(TC[pick.id]||[1]).length)];
  document.getElementById('cb-n').textContent=pick.label;
  document.getElementById('cb-t').textContent=ch;
  var box=document.getElementById('cbox');box.style.display='block';
  if(window.anime)anime({targets:'#cbox',scale:[.88,1],opacity:[0,1],duration:280,easing:'easeOutBack'});
  sel(pick.id);
}

// render loop
var t=0;
function animate(){
  requestAnimationFrame(animate);t+=.008;
  // cam
  cT+=(tT-cT)*.055;cP+=(tP-cP)*.055;cR+=(tR-cR)*.055;
  if(autoRot)tT+=.003;
  updateCam();
  // rain
  for(var i=0;i<RC;i++){rPos[i*3+1]-=rVel[i];if(rPos[i*3+1]<-40){rPos[i*3+1]=40;rPos[i*3]=(Math.random()-.5)*180}}
  rGeo.attributes.position.needsUpdate=true;
  // sweep
  swY+=swD*.06;if(swY>26||swY<-26)swD*=-1;sweep.position.y=swY;
  // rings
  scene.traverse(function(o){
    if(o.isMesh&&o.userData&&o.userData.spd)o.rotation.z+=o.userData.spd*.011;
  });
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();
});
setTimeout(function(){sel('root')},700);
</script>

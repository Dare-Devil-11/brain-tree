<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI-OS — Neural Graph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020206;font-family:'SF Mono','Fira Code',monospace}
#c{position:fixed;inset:0;width:100%!important;height:100%!important;display:block}

/* minimal HUD overlay */
#hud{position:fixed;inset:0;z-index:10;pointer-events:none}

/* top-left brand tag */
#brand{position:fixed;top:16px;left:18px;z-index:11;pointer-events:none}
.brand-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(180,200,255,.55)}
.brand-sub{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.2);margin-top:2px}

/* bottom bar — thin, minimal */
#bot{position:fixed;bottom:0;left:0;right:0;z-index:11;pointer-events:none;
  height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;
  background:rgba(2,2,8,.7);border-top:1px solid rgba(255,255,255,.05)}
.bot-txt{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.18)}
.live-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:#34d399;
  margin-right:6px;box-shadow:0 0 5px #34d399;animation:pulse 1.8s ease-in-out infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* legend — bottom right */
#legend{position:fixed;bottom:34px;right:16px;z-index:11;pointer-events:none;
  display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.lg{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:1px;
  text-transform:uppercase;color:rgba(255,255,255,.22)}
.lg-dot{width:6px;height:6px;border-radius:50%}

/* signal counter */
#sigcount{position:fixed;top:16px;right:18px;z-index:11;pointer-events:none;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.18)}
#sigcount span{color:rgba(140,180,255,.6)}

/* floating tooltip */
#tip{position:fixed;z-index:20;pointer-events:none;
  background:rgba(4,6,18,.92);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.08);border-radius:8px;
  padding:10px 13px;max-width:220px;opacity:0;transition:opacity .15s;
  font-size:11px;line-height:1.6}
.tip-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px}
.tip-type{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:6px}
.tip-desc{font-size:10.5px;color:rgba(255,255,255,.5);line-height:1.55}
.tip-path{font-size:9px;color:rgba(120,160,255,.5);margin-top:5px}

/* activity blips */
#feed{position:fixed;bottom:36px;left:18px;z-index:11;pointer-events:none;
  display:flex;flex-direction:column-reverse;gap:3px}
.fi{font-size:9px;letter-spacing:.5px;color:rgba(255,255,255,.22);
  display:flex;align-items:center;gap:5px;
  opacity:0;transform:translateX(-4px);transition:all .3s}
.fi.on{opacity:1;transform:translateX(0)}
.fi-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="brand">
  <div class="brand-title">AI-OS Neural Graph</div>
  <div class="brand-sub">Karan Amin &nbsp;·&nbsp; 679 skills &nbsp;·&nbsp; 16 projects</div>
</div>

<div id="sigcount">signals <span id="sc">0</span></div>

<div id="legend">
  <div class="lg"><span style="color:rgba(255,255,255,.3)">Agent</span><div class="lg-dot" style="background:#ff6b6b;box-shadow:0 0 5px #ff6b6b40"></div></div>
  <div class="lg"><span style="color:rgba(255,255,255,.3)">Task Bot</span><div class="lg-dot" style="background:#fbbf24;box-shadow:0 0 5px #fbbf2440"></div></div>
  <div class="lg"><span style="color:rgba(255,255,255,.3)">Project</span><div class="lg-dot" style="background:#818cf8;box-shadow:0 0 5px #818cf840"></div></div>
  <div class="lg"><span style="color:rgba(255,255,255,.3)">File / Script</span><div class="lg-dot" style="background:#a78bfa;box-shadow:0 0 5px #a78bfa40"></div></div>
</div>

<div id="feed"></div>

<div id="bot">
  <div class="bot-txt"><span class="live-dot"></span>live · auto-deploy 60s · drag to orbit · scroll to zoom</div>
  <div class="bot-txt" id="bottime">——</div>
</div>

<div id="tip">
  <div class="tip-name" id="tip-name"></div>
  <div class="tip-type" id="tip-type"></div>
  <div class="tip-desc" id="tip-desc"></div>
  <div class="tip-path" id="tip-path"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── NODE DEFINITIONS ─────────────────────────────────────
const DEFS = [
  // Root
  {id:'root',    label:'Karan Amin',   type:'root',    desc:'AI-OS owner. Builder, operator, autonomous agent deployer.',path:'~/brain.md',        r:0,   bright:1.0},
  // Agents
  {id:'claude',  label:'Claude Code',  type:'agent',   desc:'Primary AI orchestrator. Sonnet 4.6. 679 skills active.',  path:'~/.claude/',         r:7,   bright:0.9},
  {id:'gemini',  label:'Gemini CLI',   type:'agent',   desc:'Google Search grounding. 1M token context. Free tier.',    path:'~/gemini-cli/',      r:7,   bright:0.75},
  {id:'ollama',  label:'Ollama',       type:'agent',   desc:'Local model routing. qwen2.5-coder:3b + llama3.2.',        path:'localhost:11434',    r:8,   bright:0.6},
  {id:'graphify',label:'Graphify',     type:'agent',   desc:'Knowledge graph builder from any file corpus.',            path:'/opt/homebrew/bin',  r:9,   bright:0.55},
  // Task bots
  {id:'cbot',    label:'Content Bot',  type:'task',    desc:'GHL social publisher. Ollama local generation.',           path:'~/content-bot/',     r:8,   bright:0.7},
  {id:'dbot',    label:'Deploy Bot',   type:'task',    desc:'LaunchAgent. Auto-deploys brain-tree every 60s.',          path:'~/Library/LaunchAgents/',r:7, bright:0.75},
  {id:'mbot',    label:'Medicaid Bot', type:'task',    desc:'IL Medicaid senior targeting. Sheets + Docs.',             path:'~/medicaid-agent/', r:9,   bright:0.5},
  {id:'watch',   label:'Tab Watchdog', type:'task',    desc:'Chrome tab cron every 15min. Frees disk auto.',            path:'~/AI-OS/state/',    r:8,   bright:0.55},
  {id:'n8n',     label:'n8n',          type:'task',    desc:'Local workflow automation engine.',                        path:'localhost:5678',     r:10,  bright:0.5},
  // Projects
  {id:'umas',    label:'UMAS',         type:'project', desc:'Elder care nonprofit Chicagoland. GHL CMS. SEO live.',     path:'umasinc.com',        r:9,   bright:0.7},
  {id:'goat',    label:'GOAT Life',    type:'project', desc:'Pixar golf comedy. EP 1-3 done. Kling + ElevenLabs.',     path:'golfonanytee.com',   r:10,  bright:0.65},
  {id:'mafs',    label:'MAFS',         type:'project', desc:'Family services. Interactive GHL form + SEO.',            path:'mafsinc.com',        r:9,   bright:0.6},
  {id:'santo',   label:'Santoshland',  type:'project', desc:'Ayurvedic wellness startup. Site stalled.',               path:'santoshland/',       r:11,  bright:0.45},
  {id:'mach',    label:'Machina XRAY', type:'project', desc:'Chrome extension v1.2. DOM search + DevTools.',           path:'~/machina-extension/',r:10, bright:0.5},
  {id:'ghlforms',label:'GHL Forms',    type:'project', desc:'UMAS + MAFS interactive step forms. Orange + blue brand.',path:'outputs/GHL-forms/', r:11,  bright:0.45},
  // Skills clusters
  {id:'seo',     label:'SEO Skills',   type:'skill',   desc:'ai-seo, seo-audit, schema-markup, content-engine.',       path:'~/.claude/skills/',  r:12,  bright:0.4},
  {id:'copy',    label:'Copywriting',  type:'skill',   desc:'Conversion copy, CTAs, sales pages.',                     path:'~/.claude/skills/',  r:12,  bright:0.35},
  {id:'uiux',    label:'UI/UX Pro Max',type:'skill',   desc:'67 styles, 96 palettes, 57 font pairings.',               path:'~/.claude/skills/',  r:13,  bright:0.35},
  {id:'gsd',     label:'GSD Agents',   type:'skill',   desc:'33 specialized agents. Plan/execute/verify.',             path:'~/get-shit-done/',   r:12,  bright:0.4},
  {id:'skills4', label:'Video Skills', type:'skill',   desc:'voicebox-pro, ads-youtube, video-content-strategist.',    path:'~/.claude/skills/',  r:14,  bright:0.3},
  {id:'skills5', label:'Email Skills', type:'skill',   desc:'email-sequence, nurture flows, GHL automations.',         path:'~/.claude/skills/',  r:14,  bright:0.3},
  {id:'skills6', label:'Planning Pro', type:'skill',   desc:'ultraplan, planning-pro, OKRs, roadmaps.',                path:'~/.claude/skills/',  r:13,  bright:0.3},
  {id:'skills7', label:'Analytics',    type:'skill',   desc:'analytics-dashboard, KPI setup, tracking events.',        path:'~/.claude/skills/',  r:15,  bright:0.28},
  {id:'skills8', label:'CRO Skills',   type:'skill',   desc:'page-cro, conversion optimization.',                      path:'~/.claude/skills/',  r:15,  bright:0.28},
  {id:'skills9', label:'Stop Slop',    type:'skill',   desc:'33 persona agents: CEO, CTO, PM, Growth, Finance.',       path:'~/stop-slop/',       r:13,  bright:0.32},
  // Files / scripts
  {id:'bthtml',  label:'brain-tree.html',type:'file',  desc:'This visualization. Auto-deployed every 60s.',           path:'~/AI-OS/outputs/',   r:10,  bright:0.6},
  {id:'btjson',  label:'brain-tree.json',type:'file',  desc:'19,961 nodes, 3,199 edges. Source knowledge graph.',     path:'~/AI-OS/outputs/',   r:11,  bright:0.45},
  {id:'buildpy', label:'build-brain.py', type:'script',desc:'Reads JSON, writes this HTML. Runs on memory bot trigger.',path:'~/AI-OS/scripts/',  r:11,  bright:0.4},
  {id:'deplsh',  label:'deploy-brain.sh',type:'script',desc:'Push to GitHub Pages. LaunchAgent fires every 60s.',     path:'~/AI-OS/scripts/',   r:10,  bright:0.45},
  {id:'slog',    label:'session-log.md', type:'file',  desc:'Rolling session log. Appended every action.',            path:'~/AI-OS/logs/',      r:12,  bright:0.4},
  {id:'klog',    label:'keystroke-log',  type:'file',  desc:'Keystroke log. Written by PostToolUse hook.',            path:'~/AI-OS/logs/',      r:13,  bright:0.3},
  {id:'brain',   label:'brain.md',       type:'file',  desc:'Master identity + project context. Loaded every session.',path:'~/brain.md',        r:8,   bright:0.55},
  // outer scatter nodes — bulk of the "galaxy"
  ...Array.from({length:120},(_,i)=>({
    id:`s${i}`,
    label:`skill_${i}`,
    type:'dot',
    desc:'Installed skill node.',
    path:'~/.claude/skills/',
    r: 16+Math.random()*12,
    bright: 0.1+Math.random()*0.22
  }))
];

// adjacency
const EDGES = [
  ['root','claude'],['root','gemini'],['root','ollama'],['root','graphify'],
  ['root','cbot'],['root','dbot'],['root','watch'],['root','n8n'],
  ['root','umas'],['root','goat'],['root','mafs'],['root','brain'],
  ['root','bthtml'],['root','btjson'],
  ['claude','umas'],['claude','goat'],['claude','mafs'],['claude','santo'],
  ['claude','seo'],['claude','copy'],['claude','uiux'],['claude','gsd'],
  ['claude','bthtml'],['claude','buildpy'],['claude','deplsh'],['claude','skills9'],
  ['gemini','claude'],['ollama','claude'],['graphify','btjson'],
  ['dbot','bthtml'],['dbot','deplsh'],
  ['cbot','umas'],['cbot','n8n'],
  ['mbot','umas'],['watch','claude'],
  ['umas','seo'],['umas','copy'],['umas','ghlforms'],['umas','slog'],
  ['goat','skills4'],['mafs','ghlforms'],['santo','copy'],
  ['buildpy','bthtml'],['buildpy','btjson'],
  ['bthtml','deplsh'],['brain','claude'],
  ['seo','skills5'],['uiux','copy'],['gsd','claude'],
  ['skills9','claude'],['skills6','claude'],['skills7','seo'],['skills8','uiux'],
  ['klog','claude'],['slog','claude'],['mach','claude'],
];

// node type → color
const TCOL = {
  root:    [1.0,  1.0,  1.0],
  agent:   [1.0,  0.42, 0.42],
  task:    [0.98, 0.75, 0.14],
  project: [0.51, 0.55, 0.98],
  skill:   [0.0,  0.85, 0.72],
  file:    [0.67, 0.55, 0.98],
  script:  [0.98, 0.57, 0.19],
  dot:     [0.75, 0.78, 0.9],
};

// ─── THREE SETUP ──────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x020206, 1);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 1000);
cam.position.z = 52;

// ─── BUILD NODE POSITIONS ─────────────────────────────────
const nodePos = {};
const PHI = Math.PI*(3-Math.sqrt(5));

DEFS.forEach((d,i)=>{
  if(d.id==='root'){
    nodePos[d.id]=new THREE.Vector3(0,0,0);
    return;
  }
  // Distribute around the sphere at radius r with slight z-depth variance
  const angle = i*PHI*2.3 + (d.r*0.7);
  const elevation = (Math.random()-0.5)*1.4;
  const jitter = (Math.random()-0.5)*2.5;
  const depth = (Math.random()-0.5)*d.r*0.35;
  nodePos[d.id] = new THREE.Vector3(
    Math.cos(angle)*d.r + jitter,
    Math.sin(angle)*d.r*0.65 + elevation*2,
    depth
  );
});

// ─── POINT CLOUD ─────────────────────────────────────────
const N = DEFS.length;
const ppos = new Float32Array(N*3);
const pcol = new Float32Array(N*3);
const psiz = new Float32Array(N);

DEFS.forEach((d,i)=>{
  const p = nodePos[d.id];
  ppos[i*3]=p.x; ppos[i*3+1]=p.y; ppos[i*3+2]=p.z;
  const c = TCOL[d.type]||TCOL.dot;
  const b = d.bright;
  pcol[i*3]=c[0]*b; pcol[i*3+1]=c[1]*b; pcol[i*3+2]=c[2]*b;
  // size: root biggest, agents/tasks medium, skills/dots tiny
  psiz[i] = d.type==='root'?4.2:d.type==='agent'?2.2:d.type==='task'?1.9:d.type==='project'?1.7:d.type==='file'||d.type==='script'?1.5:d.type==='skill'?1.3:0.7;
});

const ptGeo = new THREE.BufferGeometry();
ptGeo.setAttribute('position', new THREE.BufferAttribute(ppos,3));
ptGeo.setAttribute('color',    new THREE.BufferAttribute(pcol,3));

// custom shader-like point material for circular dots
const ptMat = new THREE.PointsMaterial({
  vertexColors:true, transparent:true, opacity:1,
  blending:THREE.AdditiveBlending, depthWrite:false,
  size:0.55, sizeAttenuation:true
});
scene.add(new THREE.Points(ptGeo, ptMat));

// ─── EDGE LINES ───────────────────────────────────────────
const everts = [];
EDGES.forEach(([a,b])=>{
  const pa=nodePos[a], pb=nodePos[b];
  if(!pa||!pb) return;
  everts.push(pa.x,pa.y,pa.z, pb.x,pb.y,pb.z);
});
const lGeo = new THREE.BufferGeometry();
lGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(everts),3));
const lMat = new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.055, blending:THREE.AdditiveBlending});
scene.add(new THREE.LineSegments(lGeo,lMat));

// ─── ROOT GLOW — multilayer halo like the Obsidian bright hub ──
function makeGlow(r, col, op){
  const g=new THREE.SphereGeometry(r,20,14);
  const m=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.FrontSide});
  return new THREE.Mesh(g,m);
}
const glows = [
  makeGlow(0.35, 0xffffff, 0.95),
  makeGlow(0.75, 0xd0e0ff, 0.35),
  makeGlow(1.5,  0x8090ff, 0.15),
  makeGlow(2.8,  0x4060cc, 0.07),
  makeGlow(5.0,  0x2040aa, 0.04),
  makeGlow(9.0,  0x102080, 0.02),
];
glows.forEach(g=>scene.add(g));

// ─── AGENT GLOW nodes ─────────────────────────────────────
const agentKeys = ['claude','gemini','dbot','cbot'];
const agentGlows = [];
agentKeys.forEach(k=>{
  const p=nodePos[k]; if(!p) return;
  const g2=makeGlow(0.25,0xff8080,0.7);
  g2.position.copy(p);
  scene.add(g2);
  const g3=makeGlow(0.6,0xff4040,0.18);
  g3.position.copy(p);
  scene.add(g3);
  agentGlows.push({mesh:g2,pos:p,phase:Math.random()*Math.PI*2});
});

// ─── SECONDARY GLOW NODES for projects ────────────────────
['umas','goat','bthtml'].forEach(k=>{
  const p=nodePos[k]; if(!p) return;
  const g=makeGlow(0.22,0x8899ff,0.5);
  g.position.copy(p); scene.add(g);
  const g2=makeGlow(0.55,0x5566cc,0.12);
  g2.position.copy(p); scene.add(g2);
});

// ─── NODE FLASH STATE ─────────────────────────────────────
const flash = new Float32Array(N);
const flashR = new Float32Array(N);
const flashG = new Float32Array(N);
const flashB = new Float32Array(N);

// store base colors for reset
const baseR=new Float32Array(N), baseG=new Float32Array(N), baseB=new Float32Array(N);
for(let i=0;i<N;i++){baseR[i]=pcol[i*3];baseG[i]=pcol[i*3+1];baseB[i]=pcol[i*3+2];}

function flashNode(idx, cr, cg, cb){
  flash[idx]=Math.min(flash[idx]+1.8,2.5);
  flashR[idx]=cr; flashG[idx]=cg; flashB[idx]=cb;
}

// ─── SIGNAL PULSE SYSTEM ──────────────────────────────────
const signals=[]; const pool=[];
const adjMap={};
EDGES.forEach(([a,b])=>{
  if(!adjMap[a]) adjMap[a]=[];
  if(!adjMap[b]) adjMap[b]=[];
  adjMap[a].push(b); adjMap[b].push(a);
});

const defIdx={};
DEFS.forEach((d,i)=>defIdx[d.id]=i);

function getSig(){
  if(pool.length) return pool.pop();
  const g=new THREE.SphereGeometry(0.18,5,5);
  const m=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false});
  return new THREE.Mesh(g,m);
}

function fire(fromId, toId, col=0xffffff){
  if(signals.length>=30) return;
  const pa=nodePos[fromId], pb=nodePos[toId];
  if(!pa||!pb) return;
  const m=getSig(); m.visible=true; m.material.color.setHex(col); scene.add(m);
  signals.push({pa,pb,t:0,spd:0.008+Math.random()*0.006,mesh:m,toId,col});
}

function burst(nodeId, col=0xffffff){
  const nb=adjMap[nodeId]||[];
  nb.slice(0,5).forEach(n=>fire(nodeId,n,col));
  const i=defIdx[nodeId];
  if(i!==undefined){
    const c=new THREE.Color(col);
    flashNode(i,c.r,c.g,c.b);
  }
}

// ─── MOUSE ORBIT ──────────────────────────────────────────
let drag=false,lx=0,ly=0,vx=0,vy=0,rx=0,ry=0;
canvas.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;vx=vy=0});
window.addEventListener('mousemove',e=>{
  if(drag){vx+=(e.clientX-lx)*0.002;vy+=(e.clientY-ly)*0.002;lx=e.clientX;ly=e.clientY;}
  handleHover(e);
});
window.addEventListener('mouseup',()=>drag=false);
canvas.addEventListener('wheel',e=>{cam.position.z=Math.min(120,Math.max(18,cam.position.z+e.deltaY*0.06))},{passive:true});
canvas.addEventListener('click',e=>handleClick(e));

// ─── RAYCASTING for hover/click ───────────────────────────
const raycaster=new THREE.Raycaster();
raycaster.params.Points.threshold=0.8;
const mouse=new THREE.Vector2();
const ptCloud=scene.children.find(c=>c instanceof THREE.Points);
let hoveredId=null;
const tip=document.getElementById('tip');

function projectToScreen(vec3){
  const v=vec3.clone().project(cam);
  return {x:(v.x+1)/2*innerWidth, y:(-v.y+1)/2*innerHeight};
}

function handleHover(e){
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,cam);
  const hits=raycaster.intersectObject(ptCloud);
  if(hits.length){
    const idx=hits[0].index;
    const d=DEFS[idx];
    if(d&&d.type!=='dot'){
      hoveredId=d.id;
      document.getElementById('tip-name').textContent=d.label;
      document.getElementById('tip-type').textContent=d.type;
      document.getElementById('tip-desc').textContent=d.desc;
      document.getElementById('tip-path').textContent=d.path;
      let tx=e.clientX+14, ty=e.clientY-10;
      if(tx+220>innerWidth) tx=e.clientX-234;
      tip.style.left=tx+'px'; tip.style.top=ty+'px';
      tip.style.opacity='1';
      return;
    }
  }
  hoveredId=null;
  tip.style.opacity='0';
}

function handleClick(e){
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,cam);
  const hits=raycaster.intersectObject(ptCloud);
  if(hits.length){
    const d=DEFS[hits[0].index];
    if(d){
      const tc=TCOL[d.type]||TCOL.dot;
      const col=new THREE.Color(tc[0],tc[1],tc[2]);
      burst(d.id,col.getHex());
    }
  }
}

// ─── ACTIVITY FEED ────────────────────────────────────────
const FEED=[
  {col:'#ff6b6b',txt:'Claude Code → brain-tree.html written',node:'claude',sigcol:0xff5555},
  {col:'#fbbf24',txt:'Deploy Bot → GitHub Pages push',node:'dbot',sigcol:0xffaa22},
  {col:'#a78bfa',txt:'session-log.md modified',node:'slog',sigcol:0xaa88ff},
  {col:'#818cf8',txt:'UMAS → service page SEO update',node:'umas',sigcol:0x8888ff},
  {col:'#ff6b6b',txt:'Gemini CLI → research query',node:'gemini',sigcol:0xff5555},
  {col:'#fbbf24',txt:'Tab Watchdog → 4 tabs closed',node:'watch',sigcol:0xffaa22},
  {col:'#34d399',txt:'brain-tree.json read',node:'btjson',sigcol:0x33dd99},
  {col:'#ff6b6b',txt:'Claude Code → skill invoked',node:'claude',sigcol:0xff5555},
  {col:'#fbbf24',txt:'Content Bot → GHL post queued',node:'cbot',sigcol:0xffaa22},
  {col:'#a78bfa',txt:'keystroke-log.md append',node:'klog',sigcol:0xaa88ff},
  {col:'#818cf8',txt:'GOAT Life → EP4 script gen',node:'goat',sigcol:0x8888ff},
  {col:'#34d399',txt:'build-brain.py executed',node:'buildpy',sigcol:0x33dd99},
];
let feedIdx=0;
const feedEl=document.getElementById('feed');

function addFeed(){
  const f=FEED[feedIdx%FEED.length]; feedIdx++;
  const el=document.createElement('div');
  el.className='fi';
  el.innerHTML=`<div class="fi-dot" style="background:${f.col}"></div>${f.txt}`;
  feedEl.prepend(el);
  requestAnimationFrame(()=>el.classList.add('on'));
  while(feedEl.children.length>4) feedEl.lastChild.remove();
  fire('root',f.node,f.sigcol);
  burst(f.node,f.sigcol);
}
setInterval(addFeed,3000);
setTimeout(addFeed,600);

// ─── AUTO SIGNALS ─────────────────────────────────────────
const edgeList=EDGES.filter(([a,b])=>nodePos[a]&&nodePos[b]);
let autoT=0, burstT=0;
function autoFire(){
  const e=edgeList[Math.floor(Math.random()*edgeList.length)];
  fire(e[0],e[1],0xaabbff);
}

// ─── CLOCK ────────────────────────────────────────────────
function clk(){
  const n=new Date();
  document.getElementById('bottime').textContent=
    n.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+
    n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
clk(); setInterval(clk,10000);

// ─── MAIN LOOP ────────────────────────────────────────────
let t=0, sweepPhase=0;

function tick(){
  requestAnimationFrame(tick);
  t+=0.004;

  // orbit inertia
  if(!drag){vx*=0.94;vy*=0.94;}
  rx+=vy; ry+=vx;
  if(!drag&&Math.abs(vx)<0.0004&&Math.abs(vy)<0.0004) ry+=0.00035;
  rx=Math.max(-1.0,Math.min(1.0,rx));
  scene.rotation.x=rx; scene.rotation.y=ry;

  // root glow pulse
  const gp=Math.sin(t*1.2)*0.5+0.5;
  glows[0].scale.setScalar(0.9+gp*0.25);
  glows[1].scale.setScalar(0.95+gp*0.2);
  glows[0].material.opacity=0.7+gp*0.3;

  // agent glow flicker
  agentGlows.forEach((ag,i)=>{
    const f=Math.sin(t*2.5+ag.phase)*0.5+0.5;
    ag.mesh.material.opacity=0.4+f*0.5;
    ag.mesh.scale.setScalar(0.85+f*0.3);
  });

  // auto fire signals
  autoT++;
  if(autoT>25){autoT=0; autoFire(); if(Math.random()<0.4) autoFire();}
  burstT++;
  if(burstT>500){
    burstT=0;
    const ids=['root','claude','umas','dbot','gemini'];
    const k=ids[Math.floor(Math.random()*ids.length)];
    const tc=DEFS.find(d=>d.id===k);
    const c=tc?TCOL[tc.type]:TCOL.dot;
    burst(k,new THREE.Color(c[0],c[1],c[2]).getHex());
  }

  // update signals
  for(let i=signals.length-1;i>=0;i--){
    const s=signals[i];
    s.t+=s.spd;
    if(s.t>=1){
      const ti=defIdx[s.toId];
      if(ti!==undefined){
        const sc=new THREE.Color(s.col);
        flashNode(ti,sc.r,sc.g,sc.b);
      }
      // cascade
      if(Math.random()<0.35){
        const nb=adjMap[s.toId]||[];
        if(nb.length) fire(s.toId, nb[Math.floor(Math.random()*nb.length)], s.col);
      }
      s.mesh.visible=false; scene.remove(s.mesh); pool.push(s.mesh);
      signals.splice(i,1);
    } else {
      s.mesh.position.lerpVectors(s.pa,s.pb,s.t);
      const edge=Math.min(s.t*7,(1-s.t)*7,1.0);
      s.mesh.material.opacity=edge;
    }
  }

  // flash decay + color write
  for(let i=0;i<N;i++){
    const f=flash[i];
    if(f>0){
      const ff=Math.min(f,1.0);
      pcol[i*3]=baseR[i]+ff*flashR[i];
      pcol[i*3+1]=baseG[i]+ff*flashG[i];
      pcol[i*3+2]=baseB[i]+ff*flashB[i];
      flash[i]=Math.max(0,f-0.025);
    } else {
      pcol[i*3]=baseR[i]; pcol[i*3+1]=baseG[i]; pcol[i*3+2]=baseB[i];
    }
  }
  ptGeo.attributes.color.needsUpdate=true;

  document.getElementById('sc').textContent=signals.length;
  renderer.render(scene,cam);
}
tick();

// ─── RESIZE ───────────────────────────────────────────────
window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// initial burst
setTimeout(()=>{
  burst('root',0xffffff);
  setTimeout(()=>burst('claude',0xff5555),500);
  setTimeout(()=>burst('umas',0x8888ff),1000);
},300);
</script>
</body>

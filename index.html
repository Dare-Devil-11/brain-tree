<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-OS — Neural Brain Tree</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<style>
:root {
  --bg:#000912; --surface:rgba(10,12,22,.8); --surface2:rgba(18,20,35,.65);
  --text:#f6f4f2; --muted:rgba(246,244,242,.45); --border:rgba(246,244,242,.08);
  --accent:#ff4b4b; --green:#00ffaa; --cyan:#00e5ff;
  --blur:20px; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);overflow:hidden;font-family:'SF Mono','Fira Code',monospace}

/* ── Hologram BG ─────────────────────── */
#hologram-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,200,255,.006) 3px,rgba(0,200,255,.006) 4px)}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:3;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,4,18,.65) 100%)}
.corner{position:fixed;z-index:5;pointer-events:none;width:18px;height:18px;border-color:rgba(0,229,255,.18);border-style:solid}
.tl{top:12px;left:12px;border-width:1px 0 0 1px}
.tr{top:12px;right:12px;border-width:1px 1px 0 0}
.bl{bottom:12px;left:12px;border-width:0 0 1px 1px}
.br{bottom:12px;right:12px;border-width:0 1px 1px 0}

/* ── App Grid ────────────────────────── */
#app{position:fixed;inset:0;z-index:10;display:grid;
  grid-template-columns:260px 1fr 280px;grid-template-rows:48px 1fr;height:100vh}

/* ── Topbar ──────────────────────────── */
#topbar{grid-column:1/-1;background:var(--surface);backdrop-filter:blur(var(--blur));
  -webkit-backdrop-filter:blur(var(--blur));border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 16px}
.logo{color:var(--accent);font-size:13px;font-weight:700;letter-spacing:.08em;white-space:nowrap}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
#search{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;
  padding:5px 11px;color:var(--text);font-family:inherit;font-size:11px;outline:none;min-width:0}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted)}
.pill{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;
  padding:2px 9px;font-size:10px;color:var(--muted);white-space:nowrap}
.pill span{color:var(--text)}
#vtoggle{display:flex;gap:3px}
.vbtn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);
  padding:3px 9px;font-size:10px;font-family:inherit;border-radius:4px;cursor:pointer;transition:all .2s}
.vbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#rng-btn{background:linear-gradient(135deg,#ff4b4b,#7c3aed);border:none;border-radius:5px;
  padding:4px 11px;color:#fff;font-family:inherit;font-size:10px;font-weight:700;
  cursor:pointer;letter-spacing:.04em;white-space:nowrap;transition:opacity .2s}
#rng-btn:hover{opacity:.82}

/* ── Sidebar ─────────────────────────── */
#sidebar{background:var(--surface);backdrop-filter:blur(var(--blur));
  -webkit-backdrop-filter:blur(var(--blur));border-right:1px solid var(--border);
  overflow-y:auto;padding:10px 0}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ts{margin-bottom:3px}
.th{display:flex;align-items:center;gap:7px;padding:5px 14px;cursor:pointer;font-size:10px;
  font-weight:700;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;user-select:none}
.th:hover{color:var(--text)}
.th .d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.th .arr{margin-left:auto;transition:transform .2s;font-size:9px}
.th.open .arr{transform:rotate(90deg)}
.tc{display:none}.tc.open{display:block}
.ti{padding:4px 14px 4px 32px;font-size:10px;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:color .15s,background .15s}
.ti:hover,.ti.active{color:var(--text);background:rgba(255,75,75,.06)}
.ti .badge{margin-left:auto;font-size:8px;background:rgba(255,255,255,.05);
  border:1px solid var(--border);border-radius:6px;padding:1px 4px;color:var(--muted)}

/* ── Main (transparent — hologram shows through) ── */
#main{position:relative;overflow:hidden;background:transparent}
#gc{width:100%;height:100%}
#tv{width:100%;height:100%;display:none;overflow:auto;padding:14px 0}

/* ── Detail Panel ────────────────────── */
#detail{background:var(--surface);backdrop-filter:blur(var(--blur));
  -webkit-backdrop-filter:blur(var(--blur));border-left:1px solid var(--border);
  overflow-y:auto;padding:14px}
#detail::-webkit-scrollbar{width:3px}
#detail::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.de{color:var(--muted);font-size:11px;text-align:center;margin-top:36px;line-height:1.8}
.dt{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.dn{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.3}
.dd{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.dr{display:flex;gap:7px;margin-bottom:7px;align-items:flex-start}
.dk{font-size:10px;color:var(--muted);min-width:72px;padding-top:1px}
.dv{font-size:10px;color:var(--text);word-break:break-all;flex:1}
.dtag{display:inline-block;background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:3px;padding:1px 5px;font-size:9px;color:var(--muted);margin:2px}
.dsec{margin-top:14px;border-top:1px solid var(--border);padding-top:10px}
.dst{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.br-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.bl2{font-size:9px;color:var(--muted);min-width:72px}
.bt{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.bf{height:100%;border-radius:2px}
.bc{font-size:9px;color:var(--muted);min-width:20px;text-align:right}
.sb{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;margin-bottom:10px}
.s-active{background:rgba(0,255,170,.12);color:var(--green);border:1px solid rgba(0,255,170,.2)}
.s-installed-unwired{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.s-primary{background:rgba(255,75,75,.12);color:var(--accent);border:1px solid rgba(255,75,75,.2)}
.s-prototype{background:rgba(107,114,128,.2);color:#9ca3af;border:1px solid rgba(107,114,128,.2)}

/* ── Map legend ──────────────────────── */
#mm{position:absolute;bottom:14px;right:14px;background:var(--surface2);
  backdrop-filter:blur(var(--blur));border:1px solid var(--border);border-radius:8px;
  padding:8px;font-size:10px;color:var(--muted);line-height:1.8;pointer-events:none}
.mr{display:flex;align-items:center;gap:5px}
.md{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Nodes + links ───────────────────── */
.node circle{cursor:pointer}
.node text{pointer-events:none;font-family:'SF Mono',monospace;fill:var(--text)}
.link{stroke:rgba(246,244,242,.13);stroke-width:1}
.link.hl{stroke:var(--accent);stroke-width:1.5;opacity:.7}
.node.dim circle{opacity:.1}.node.dim text{opacity:.06}
.node.hl circle{stroke:#fff;stroke-width:2}

/* ── Tooltip ─────────────────────────── */
#tip{position:fixed;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:7px 11px;font-size:10px;pointer-events:none;
  opacity:0;transition:opacity .15s;z-index:200;max-width:200px;line-height:1.6;
  backdrop-filter:blur(var(--blur))}
.tt{color:var(--text);font-weight:700;margin-bottom:2px}
.ty{color:var(--muted);font-size:9px}

/* ── Challenge box ───────────────────── */
#challenge-box{position:fixed;bottom:72px;right:16px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:10px;
  max-width:240px;display:none;z-index:200;line-height:1.7;backdrop-filter:blur(var(--blur))}
.cb-label{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.cb-tool{font-size:12px;font-weight:700;margin-bottom:5px;color:var(--text)}
.cb-task{color:var(--muted);font-size:10px}

/* ── Animations ──────────────────────── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes tool-glow{0%,100%{filter:drop-shadow(0 0 4px currentColor);opacity:1}50%{filter:drop-shadow(0 0 12px currentColor);opacity:.85}}
.tool-node circle{animation:tool-glow 2.8s ease-in-out infinite}
.node.rng-pick circle{animation:tool-glow .7s ease-in-out infinite!important;stroke:#fff!important;stroke-width:3!important}
</style>
</head>
<body>

<!-- ── Hologram Canvas (z:0) ─────────────────────────────────── -->
<canvas id="hologram-canvas"></canvas>

<!-- ── Atmospheric overlays (z:2-5) ──────────────────────────── -->
<div id="scanlines"></div>
<div id="vignette"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<!-- ── Brain Tree UI (z:10) ──────────────────────────────────── -->
<div id="app">
  <div id="topbar">
    <div class="logo">&#11041; AI-OS</div>
    <div class="pulse"></div>
    <input id="search" type="text" placeholder="Search nodes..." />
    <div class="pill">Nodes <span id="sn">—</span></div>
    <div class="pill">Projects <span>16</span></div>
    <div class="pill">Skills <span>567</span></div>
    <div class="pill">Graph <span>19,961</span></div>
    <button id="rng-btn" onclick="randomTool()">&#x1F3B2; Random Tool</button>
    <div id="vtoggle">
      <button class="vbtn active" id="bf" onclick="setV('f')">Force</button>
      <button class="vbtn" id="bt2" onclick="setV('t')">Tree</button>
    </div>
  </div>
  <div id="sidebar"><div id="nav"></div></div>
  <div id="main">
    <svg id="gc"></svg>
    <div id="tv"></div>
    <div id="mm">
      <div class="mr"><div class="md" style="background:#ff4b4b"></div><span>Karan Amin</span></div>
      <div class="mr"><div class="md" style="background:#60a5fa"></div><span>Projects</span></div>
      <div class="mr"><div class="md" style="background:#f59e0b"></div><span>Tools</span></div>
      <div class="mr"><div class="md" style="background:#e879f9"></div><span>Skills (662)</span></div>
      <div class="mr"><div class="md" style="background:#00ffaa"></div><span>Behavior Patterns</span></div>
      <div class="mr"><div class="md" style="background:#38bdf8"></div><span>Infrastructure</span></div>
      <div class="mr"><div class="md" style="background:#fb923c"></div><span>Learned</span></div>
      <div class="mr"><div class="md" style="background:#8b5cf6"></div><span>Claude HowTo v2.1.160</span></div>
    </div>
  </div>
  <div id="detail"><p class="de">Click any node<br>to see details</p></div>
</div>

<div id="tip"><div class="tt" id="tt"></div><div class="ty" id="ty"></div></div>
<div id="challenge-box">
  <div class="cb-label">Today's Tool Challenge</div>
  <div class="cb-tool"></div>
  <div class="cb-task"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// LAYER 1: THREE.JS HOLOGRAM BACKGROUND
// ══════════════════════════════════════════════════════════════
(function() {
  const bgCanvas = document.getElementById('hologram-canvas');
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000912, 0.005);
  const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 2000);
  camera.position.set(0, 40, 240);
  camera.lookAt(0, 0, 0);
  const renderer = new THREE.WebGLRenderer({ antialias:true, canvas:bgCanvas, alpha:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x000912, 1);

  scene.add(new THREE.AmbientLight(0x001133, 3));
  const pl1 = new THREE.PointLight(0x00e5ff, 4, 400); pl1.position.set(0,120,120); scene.add(pl1);
  const pl2 = new THREE.PointLight(0x0044ff, 2, 400); pl2.position.set(-120,-60,-80); scene.add(pl2);

  const stGeo = new THREE.BufferGeometry();
  const stPos = new Float32Array(500*3);
  for(let i=0;i<500;i++){stPos[i*3]=(Math.random()-.5)*1200;stPos[i*3+1]=(Math.random()-.5)*800;stPos[i*3+2]=(Math.random()-.5)*600-200}
  stGeo.setAttribute('position',new THREE.BufferAttribute(stPos,3));
  scene.add(new THREE.Points(stGeo,new THREE.PointsMaterial({color:0x002244,size:.8,transparent:true,opacity:.5,blending:THREE.AdditiveBlending})));

  const N=240, pos=[];
  function brainPt(){
    const side=Math.random()>.5?1:-1, ox=side*22; let x,y,z,tries=0;
    do{const u=Math.random(),v=Math.random(),w=Math.random();
      const theta=2*Math.PI*u,phi=Math.acos(2*v-1),r=Math.cbrt(w);
      x=ox+r*68*Math.sin(phi)*Math.cos(theta)+(Math.random()-.5)*6;
      y=r*56*Math.sin(phi)*Math.sin(theta)+(Math.random()-.5)*6;
      z=r*52*Math.cos(phi)+(Math.random()-.5)*5;
      y*=.88+Math.abs(z/52)*.12; tries++;
    }while(tries<40&&Math.abs(x)<10&&Math.abs(y)<25);
    return new THREE.Vector3(x,y,z);
  }
  for(let i=0;i<N;i++) pos.push(brainPt());

  const edges=[], adj=Array.from({length:N},()=>[]);
  for(let i=0;i<N;i++){let c=0;for(let j=i+1;j<N&&c<7;j++){if(pos[i].distanceTo(pos[j])<52){edges.push([i,j]);adj[i].push(j);adj[j].push(i);c++;}}}

  const brainGroup = new THREE.Group(); scene.add(brainGroup);
  const lp=new Float32Array(edges.length*6), lc=new Float32Array(edges.length*6);
  for(let i=0;i<edges.length;i++){const[a,b]=edges[i];lp[i*6]=pos[a].x;lp[i*6+1]=pos[a].y;lp[i*6+2]=pos[a].z;lp[i*6+3]=pos[b].x;lp[i*6+4]=pos[b].y;lp[i*6+5]=pos[b].z;for(let v=0;v<2;v++){lc[i*6+v*3]=0;lc[i*6+v*3+1]=.25;lc[i*6+v*3+2]=.55;}}
  const lg=new THREE.BufferGeometry();
  lg.setAttribute('position',new THREE.BufferAttribute(lp,3));
  lg.setAttribute('color',new THREE.BufferAttribute(lc,3));
  brainGroup.add(new THREE.LineSegments(lg,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.18,blending:THREE.AdditiveBlending,depthWrite:false})));

  const ncArr=new Float32Array(N*3),nsArr=new Float32Array(N),nact=new Float32Array(N);
  for(let i=0;i<N;i++){const hub=adj[i].length>=5;ncArr[i*3]=hub?0:.05;ncArr[i*3+1]=hub?.85:.4;ncArr[i*3+2]=1;nsArr[i]=hub?5.5:2+Math.random()*1.5;}
  const npArr=new Float32Array(N*3);
  for(let i=0;i<N;i++){npArr[i*3]=pos[i].x;npArr[i*3+1]=pos[i].y;npArr[i*3+2]=pos[i].z;}
  const ng=new THREE.BufferGeometry();
  ng.setAttribute('position',new THREE.BufferAttribute(npArr,3));
  ng.setAttribute('color',new THREE.BufferAttribute(ncArr,3));
  ng.setAttribute('aSize',new THREE.BufferAttribute(nsArr,1));
  const nm=new THREE.ShaderMaterial({
    vertexShader:`attribute float aSize;attribute vec3 color;varying vec3 vC;void main(){vC=color;vec4 mv=modelViewMatrix*vec4(position,1.0);gl_PointSize=aSize*(320.0/-mv.z);gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`varying vec3 vC;void main(){vec2 uv=gl_PointCoord-vec2(.5);float d=length(uv);if(d>.5)discard;float core=1.-smoothstep(0.,.15,d);float g1=exp(-d*6.)*.7;float g2=exp(-d*2.5)*.3;float a=(1.-smoothstep(.1,.5,d))*.95;gl_FragColor=vec4(vC+g1+g2*.5,a+core*.5);}`,
    transparent:true,blending:THREE.AdditiveBlending,depthWrite:false
  });
  brainGroup.add(new THREE.Points(ng,nm));

  const SMAX=80,SCOLS=[0x00ffff,0x00aaff,0xffffff,0x44ffaa,0x8888ff];
  const sPool=[],sSig=[];
  const sGeo=new THREE.SphereGeometry(1.4,6,4);
  for(let i=0;i<SMAX;i++){const m=new THREE.Mesh(sGeo,new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:.9,blending:THREE.AdditiveBlending,depthWrite:false}));m.visible=false;brainGroup.add(m);sPool.push(m);}
  function spawnSignal(from){if(!adj[from].length)return;const to=adj[from][Math.floor(Math.random()*adj[from].length)];const slot=sPool.findIndex(m=>!m.visible);if(slot<0)return;sPool[slot].visible=true;sPool[slot].material.color.setHex(SCOLS[Math.floor(Math.random()*SCOLS.length)]);sSig.push({from,to,t:0,speed:.25+Math.random()*.55,slot});}

  const sg=new THREE.Group();brainGroup.add(sg);
  const scanMesh=new THREE.Mesh(new THREE.PlaneGeometry(280,180),new THREE.MeshBasicMaterial({color:0x00e5ff,transparent:true,opacity:.025,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
  scanMesh.rotation.x=Math.PI/2;sg.add(scanMesh);
  const seP=new Float32Array([-140,0,-90,140,0,-90,140,0,-90,140,0,90,140,0,90,-140,0,90,-140,0,90,-140,0,-90]);
  const seG=new THREE.BufferGeometry();seG.setAttribute('position',new THREE.BufferAttribute(seP,3));
  const scanEdge=new THREE.LineSegments(seG,new THREE.LineBasicMaterial({color:0x00e5ff,transparent:true,opacity:.7,blending:THREE.AdditiveBlending,depthWrite:false}));
  sg.add(scanEdge);
  let scanY=-70,scanDir=1;

  for(let i=0;i<40;i++) setTimeout(()=>spawnSignal(Math.floor(Math.random()*N)),i*55);

  const clock=new THREE.Clock();
  let sigT=0;
  function animateHologram(){
    requestAnimationFrame(animateHologram);
    const dt=clock.getDelta(),t=clock.getElapsedTime();
    brainGroup.rotation.y+=.0018;
    brainGroup.rotation.x=Math.sin(t*.08)*.06;
    scanY+=28*dt*scanDir;
    if(scanY>72)scanDir=-1;if(scanY<-72)scanDir=1;
    sg.position.y=scanY;
    scanMesh.material.opacity=.02+Math.sin(t*2.5)*.01;
    scanEdge.material.opacity=.5+Math.sin(t*2.5)*.2;
    sigT+=dt;
    if(sigT>.09){sigT=0;if(sSig.length<SMAX-10)spawnSignal(Math.floor(Math.random()*N));}
    for(let i=sSig.length-1;i>=0;i--){const s=sSig[i];s.t+=s.speed*dt;if(s.t>=1){nact[s.to]=1;if(Math.random()>.4)spawnSignal(s.to);sPool[s.slot].visible=false;sSig.splice(i,1);}else{sPool[s.slot].position.lerpVectors(pos[s.from],pos[s.to],s.t);sPool[s.slot].scale.setScalar(1-Math.abs(s.t-.5)*.6);}}
    for(let i=0;i<N;i++)if(Math.abs(pos[i].y-scanY)<7)nact[i]=Math.max(nact[i],.5);
    for(let i=0;i<N;i++){const hub=adj[i].length>=5,a=nact[i],p=.3+.15*Math.sin(t*.6+i*.4);if(a>.01){ncArr[i*3]=a*.6;ncArr[i*3+1]=.5+a*.5;ncArr[i*3+2]=1;nsArr[i]=(hub?5.5:2.5)*(1+a*.8);nact[i]*=.91;}else{ncArr[i*3]=hub?0:.04;ncArr[i*3+1]=hub?.65+p*.25:.3+p*.15;ncArr[i*3+2]=.85+p*.15;nsArr[i]=hub?5:1.8+Math.sin(t*.4+i)*.3;}}
    ng.attributes.color.needsUpdate=true;
    ng.attributes.aSize.needsUpdate=true;
    renderer.render(scene,camera);
  }
  animateHologram();

  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
})();

// ══════════════════════════════════════════════════════════════

function buildTree(c){function rn(n,d){var w=document.createElement('div');w.style.cssText='padding-left:'+(d*18+14)+'px;margin:2px 0';var row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:6px;cursor:pointer';var dot=document.createElement('span');dot.textContent='●';dot.style.cssText='color:'+(n.color||'#888')+';font-size:8px';row.appendChild(dot);var lbl=document.createElement('span');lbl.textContent=n.label;lbl.style.cssText='font-size:11px;color:#f6f4f2';row.appendChild(lbl);if(n.graph_nodes){var cnt=document.createElement('span');cnt.textContent=n.graph_nodes;cnt.style.cssText='font-size:8px;color:#888;margin-left:auto';row.appendChild(cnt)}row.onmouseover=()=>row.style.background='rgba(255,255,255,.04)';row.onmouseout=()=>row.style.background='';row.onclick=()=>sel(n.id);w.appendChild(row);if(n.children)n.children.forEach(ch=>w.appendChild(rn(ch,d+1)));return w;}c.appendChild(rn(D,0));}
window.addEventListener('resize',()=>{W=document.getElementById('main').clientWidth;H=document.getElementById('main').clientHeight;svg.attr('width',W).attr('height',H);sim.force('center',d3.forceCenter(W/2,H/2)).alpha(.1).restart();});
setTimeout(()=>sel('root'),900);
